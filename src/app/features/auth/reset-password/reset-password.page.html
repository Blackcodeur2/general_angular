<main class="auth">
    <section class="auth__card" aria-label="Nouveau mot de passe">
        <header class="auth__header">
            <h1 class="auth__title">Nouveau mot de passe</h1>
            <p class="auth__subtitle">Créez un nouveau mot de passe pour <strong>{{ appName }}</strong></p>
        </header>

        <form class="auth__form" [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">

            <div class="field">
                <label class="field__label" for="email">Email</label>
                <div class="input-container">
                    <span class="input-icon">✉️</span>
                    <input id="email" class="field__control" type="email" formControlName="email"
                        placeholder="votre@email.com" />
                </div>
            </div>

            <div class="field">
                <label class="field__label" for="password">Nouveau mot de passe</label>
                <div class="input-container">
                    <span class="input-icon">🔒</span>
                    <input id="password" class="field__control" type="password" formControlName="password"
                        autocomplete="new-password" placeholder="••••••••" />
                </div>
                @if (shouldShowError('password')) {
                <div class="field__error">{{ errorMessage('password') }}</div>
                }
            </div>

            <div class="field">
                <label class="field__label" for="password_confirmation">Confirmer le mot de passe</label>
                <div class="input-container">
                    <span class="input-icon">🔒</span>
                    <input id="password_confirmation" class="field__control" type="password"
                        formControlName="password_confirmation" autocomplete="new-password" placeholder="••••••••" />
                </div>
                @if (shouldShowError('password_confirmation')) {
                <div class="field__error">{{ errorMessage('password_confirmation') }}</div>
                }
            </div>

            <gev-button type="submit" variant="auth__primary" [loading]="isLoading()" loadingText="Réinitialisation...">
                Sauvegarder
            </gev-button>

            <p class="auth__footer">
                <a routerLink="/auth/login">Retour à la connexion</a>
            </p>

        </form>
    </section>
</main>
