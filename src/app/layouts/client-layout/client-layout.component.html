<div class="client-layout">
  <header class="client-header">
    <div class="header-content">
      <div class="user-info">
        <div class="user-avatar">
          {{ currentUser()?.prenom?.[0] }}{{ currentUser()?.nom?.[0] }}
        </div>
        <div class="user-details">
          <span class="user-name">{{ currentUser()?.prenom }} {{ currentUser()?.nom }}</span>
          <span class="user-role">Passager GEV</span>
        </div>
      </div>
      <button class="btn-logout" (click)="onLogout()" title="Se déconnecter">
        <div class="logout-icon">🚪</div>
        <span>Quitter</span>
      </button>
    </div>
  </header>

  <main class="client-content">
    <router-outlet></router-outlet>
  </main>
  
  <!-- Bottom Navigation Bar - Visible only on mobile -->
  <nav class="bottom-nav">
    <a class="nav-item" 
       routerLink="/client/home" 
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: true }">
      <div class="nav-icon">🏠</div>
      <span class="nav-label">Accueil</span>
    </a>

    <a class="nav-item" 
       routerLink="/client/voyages"
       routerLinkActive="active">
      <div class="nav-icon">✈️</div>
      <span class="nav-label">Voyages</span>
    </a>

    <a class="nav-item" 
       routerLink="/client/agences"
       routerLinkActive="active">
      <div class="nav-icon">🏢</div>
      <span class="nav-label">Agences</span>
    </a>

    <a class="nav-item" 
       routerLink="/client/mes-reservations"
       routerLinkActive="active">
      <div class="nav-icon">📋</div>
      <span class="nav-label">Réservations</span>
    </a>

    <a class="nav-item" 
       routerLink="/client/profile"
       routerLinkActive="active">
      <div class="nav-icon">👤</div>
      <span class="nav-label">Profil</span>
    </a>
  </nav>
</div>
